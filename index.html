<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Sky — what's that bright thing in the sky tonight? Plain-language stargazing for complete beginners. A Signal9 app.">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Sky — what's that bright thing?</title>
<style>
:root{
  --bg:#0a0e14;
  --panel:#111826;
  --panel2:#0d131f;
  --line:#232c3d;
  --ink:#ece3d2;
  --dim:#9a917f;
  --faint:#5d5748;
  --accent:#d9a95c;
  --star:#dfe7f2;
  --danger:#c96f5a;
}
body.nv{
  --bg:#0c0403;
  --panel:#150705;
  --panel2:#100504;
  --line:#2c110c;
  --ink:#e0503c;
  --dim:#96382a;
  --faint:#5c2119;
  --accent:#ff5f45;
  --star:#e0503c;
  --danger:#e0503c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  min-height:100vh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  transition:background .4s,color .4s;
}
.wrap{max-width:540px;margin:0 auto;padding:0 14px 60px}
h1,h2,.serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
header{display:flex;align-items:baseline;gap:10px;padding:18px 2px 6px}
header h1{font-size:1.9rem;margin:0;letter-spacing:.04em;font-weight:600}
header .tag{color:var(--faint);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}
header .spacer{flex:1}
button{
  font:inherit;color:var(--ink);background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:8px 13px;cursor:pointer;min-height:40px;
}
button:active{transform:translateY(1px)}
.chip{font-size:.82rem;color:var(--dim);background:transparent}
.chip.on{color:var(--accent);border-color:var(--accent)}
.card{
  background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:14px 16px;margin:12px 0;
}
#status{font-size:.95rem;line-height:1.5;color:var(--dim)}
#status .big{color:var(--ink);font-size:1.05rem}
#locline{font-size:.8rem;color:var(--faint);margin-top:6px}
#locline a{color:var(--dim);text-decoration:underline;cursor:pointer}
.modes{display:flex;gap:8px;margin-bottom:10px}
.modes button{flex:1;font-size:.85rem;color:var(--dim);background:var(--panel2)}
.modes button.on{color:var(--accent);border-color:var(--accent)}
#chart{display:block;width:100%;border-radius:12px;touch-action:manipulation}
.timerow{display:flex;align-items:center;gap:10px;margin-top:12px}
.timerow input[type=range]{flex:1;accent-color:var(--accent);min-height:40px}
.timerow .tlabel{font-size:.85rem;color:var(--dim);min-width:86px;text-align:right;font-variant-numeric:tabular-nums}
.timerow button{padding:6px 10px;font-size:.8rem;min-height:34px}
h2{font-size:1.15rem;margin:22px 2px 4px;font-weight:600}
.sub{color:var(--faint);font-size:.8rem;margin:0 2px 10px}
.obj{
  display:flex;align-items:center;gap:13px;width:100%;text-align:left;
  background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:12px 14px;margin:8px 0;min-height:60px;
}
.obj .dot{flex:0 0 34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.obj .dot canvas{display:block}
.obj .txt{flex:1;min-width:0}
.obj .nm{font-size:1.05rem}
.obj .dir{font-size:.83rem;color:var(--dim);line-height:1.35;margin-top:2px}
.obj .nums{font-size:.72rem;color:var(--faint);font-variant-numeric:tabular-nums;text-align:right;line-height:1.5;flex:0 0 auto}
.hidden-day{opacity:.55}
.empty{color:var(--dim);font-size:.9rem;line-height:1.55}
/* overlay card */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;
  align-items:flex-end;justify-content:center;z-index:30;
}
.overlay.show{display:flex}
.sheet{
  background:var(--panel);border:1px solid var(--line);border-bottom:none;
  border-radius:20px 20px 0 0;max-width:540px;width:100%;
  padding:20px 20px calc(24px + env(safe-area-inset-bottom));
  max-height:82vh;overflow-y:auto;
}
.sheet h3{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;font-size:1.5rem;margin:0 0 2px}
.sheet .kind{color:var(--faint);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.sheet .where{
  font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  font-size:1.08rem;line-height:1.5;color:var(--accent);margin:0 0 12px;
}
.sheet .blurb{font-size:.95rem;line-height:1.6;color:var(--ink);margin:0 0 14px}
.sheet .statline{display:flex;gap:18px;border-top:1px solid var(--line);padding-top:12px;flex-wrap:wrap}
.sheet .statline div{font-size:.75rem;color:var(--faint)}
.sheet .statline b{display:block;font-size:.95rem;color:var(--dim);font-weight:500;font-variant-numeric:tabular-nums}
.sheet .close{margin-top:16px;width:100%;color:var(--dim)}
/* location sheet */
.locbtns{display:flex;flex-direction:column;gap:9px;margin:14px 0}
.locbtns button{text-align:left;font-size:.92rem}
.locbtns .geo{color:var(--accent);border-color:var(--accent)}
.manual{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.manual input{
  font:inherit;font-size:16px;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:10px;padding:10px 12px;width:100%;
}
.manual input[name=nm]{grid-column:1/3}
.manual button{grid-column:1/3;color:var(--accent)}
.note{font-size:.78rem;color:var(--faint);line-height:1.5;margin-top:10px}
footer{margin-top:34px;text-align:center;color:var(--faint);font-size:.72rem;letter-spacing:.08em}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Sky</h1><span class="tag">Signal9</span>
    <span class="spacer"></span>
    <button id="nvBtn" class="chip" title="Red night-vision mode">Night&nbsp;vision</button>
  </header>

  <div class="card" id="statusCard">
    <div id="status"></div>
    <div id="locline"></div>
  </div>

  <div class="card">
    <div class="modes">
      <button id="modeDome">Sky dome</button>
      <button id="modeStrip">Horizon strip</button>
    </div>
    <canvas id="chart"></canvas>
    <div class="timerow">
      <button id="nowBtn">Now</button>
      <input type="range" id="timeSlider" min="-360" max="720" step="15" value="0" aria-label="Scrub time">
      <span class="tlabel" id="timeLabel">now</span>
    </div>
  </div>

  <h2>Up right now</h2>
  <p class="sub" id="listSub"></p>
  <div id="list"></div>

  <footer>SKY · SIGNAL9 · ALL MATH DONE ON YOUR PHONE · NOTHING LEAVES IT</footer>
</div>

<!-- object blurb card -->
<div class="overlay" id="cardOv">
  <div class="sheet" id="cardSheet"></div>
</div>

<!-- location sheet -->
<div class="overlay" id="locOv">
  <div class="sheet">
    <h3>Where are you?</h3>
    <div class="kind">Used only on your phone — never sent anywhere</div>
    <div class="locbtns">
      <button class="geo" id="geoBtn">&#9673;&nbsp; Use my location</button>
      <button data-loc="-42.882,147.327,Hobart">Hobart</button>
      <button data-loc="-41.436,147.139,Launceston">Launceston</button>
      <button data-loc="-37.814,144.963,Melbourne">Melbourne</button>
      <button data-loc="-33.869,151.209,Sydney">Sydney</button>
    </div>
    <div class="manual">
      <input name="nm" id="mNm" placeholder="Place name (optional)">
      <input id="mLat" placeholder="Latitude e.g. -42.9" inputmode="decimal">
      <input id="mLng" placeholder="Longitude e.g. 147.3" inputmode="decimal">
      <button id="mSave">Save this location</button>
    </div>
    <p class="note">South of the equator latitude is negative; east of Greenwich longitude is positive. A rough guess within a degree or so is plenty.</p>
    <button class="close" id="locClose">Close</button>
  </div>
</div>

<script>
'use strict';
/* ================================================================
   SKY — plain-language "what's that bright thing tonight?"
   All astronomy computed locally. Low-precision formulas after
   Paul Schlyter / Meeus — good to a fraction of a degree, which is
   far more than "look southeast, a third of the way up" needs.
   ================================================================ */

/* ---------- math helpers ---------- */
const RAD=Math.PI/180, DEG=180/Math.PI;
const sind=x=>Math.sin(x*RAD), cosd=x=>Math.cos(x*RAD);
const asind=x=>Math.asin(Math.max(-1,Math.min(1,x)))*DEG;
const atan2d=(y,x)=>Math.atan2(y,x)*DEG;
const acosd=x=>Math.acos(Math.max(-1,Math.min(1,x)))*DEG;
const rev=x=>{x%=360;return x<0?x+360:x};
const log10=Math.log10;

/* days since 2000 Jan 0.0 UT (Schlyter epoch) */
function dayNum(date){return date.getTime()/86400000+2440587.5-2451543.5;}

function eclToEq(x,y,z,ecl){
  return [x, y*cosd(ecl)-z*sind(ecl), y*sind(ecl)+z*cosd(ecl)];
}
function toRaDec(x,y,z){
  return {ra:rev(atan2d(y,x)), dec:atan2d(z,Math.hypot(x,y)), r:Math.hypot(x,y,z)};
}
function kepler(M,e){
  let E=M+e*DEG*sind(M)*(1+e*cosd(M));
  for(let i=0;i<10;i++){
    const dE=(E-e*DEG*sind(E)-M)/(1-e*cosd(E));
    E-=dE; if(Math.abs(dE)<1e-6)break;
  }
  return E;
}

/* ---------- Sun ---------- */
function sunCalc(d){
  const w=rev(282.9404+4.70935e-5*d);
  const e=0.016709-1.151e-9*d;
  const M=rev(356.0470+0.9856002585*d);
  const ecl=23.4393-3.563e-7*d;
  const E=M+e*DEG*sind(M)*(1+e*cosd(M));
  const xv=cosd(E)-e, yv=Math.sqrt(1-e*e)*sind(E);
  const v=atan2d(yv,xv), r=Math.hypot(xv,yv);
  const lon=rev(v+w);
  const xs=r*cosd(lon), ys=r*sind(lon);
  const eq=toRaDec(...eclToEq(xs,ys,0,ecl));
  return {ra:eq.ra,dec:eq.dec,r,lon,M,Ls:rev(M+w),ecl,xs,ys};
}

/* ---------- Moon (with main perturbation terms) ---------- */
function moonCalc(d,sun){
  const N=rev(125.1228-0.0529538083*d);
  const i=5.1454;
  const w=rev(318.0634+0.1643573223*d);
  const a=60.2666, e=0.054900;
  const M=rev(115.3654+13.0649929509*d);
  const E=kepler(M,e);
  const xv=a*(cosd(E)-e), yv=a*Math.sqrt(1-e*e)*sind(E);
  const v=atan2d(yv,xv); let r=Math.hypot(xv,yv);
  const xh=r*(cosd(N)*cosd(v+w)-sind(N)*sind(v+w)*cosd(i));
  const yh=r*(sind(N)*cosd(v+w)+cosd(N)*sind(v+w)*cosd(i));
  const zh=r*sind(v+w)*sind(i);
  let lon=rev(atan2d(yh,xh)), lat=atan2d(zh,Math.hypot(xh,yh));
  const Ms=sun.M, Lm=rev(N+w+M), D=rev(Lm-sun.Ls), F=rev(Lm-N);
  lon += -1.274*sind(M-2*D)+0.658*sind(2*D)-0.186*sind(Ms)
        -0.059*sind(2*M-2*D)-0.057*sind(M-2*D+Ms)+0.053*sind(M+2*D)
        +0.046*sind(2*D-Ms)+0.041*sind(M-Ms)-0.035*sind(D)
        -0.031*sind(M+Ms)-0.015*sind(2*F-2*D)+0.011*sind(M-4*D);
  lat += -0.173*sind(F-2*D)-0.055*sind(M-F-2*D)
        -0.046*sind(M+F-2*D)+0.033*sind(F+2*D)+0.017*sind(2*M+F);
  r   += -0.58*cosd(M-2*D)-0.46*cosd(2*D);
  const eq=toRaDec(...eclToEq(r*cosd(lon)*cosd(lat), r*sind(lon)*cosd(lat), r*sind(lat), sun.ecl));
  const elong=acosd(cosd(sun.lon-lon)*cosd(lat));
  const frac=(1-cosd(elong))/2;               // illuminated fraction
  const age=rev(lon-sun.lon);                 // 0 = new, 180 = full
  const phase=180-elong;                      // phase angle
  const mag=-12.73+0.026*Math.abs(phase)+4e-9*Math.pow(Math.abs(phase),4);
  return {ra:eq.ra,dec:eq.dec,r,frac,age,mag};
}

/* ---------- Planets (Keplerian elements, Schlyter) ---------- */
const PLANET_EL={
  mercury:{N0:48.3313,Nd:3.24587e-5,i0:7.0047,id:5.00e-8,w0:29.1241,wd:1.01444e-5,a:0.387098,e0:0.205635,ed:5.59e-10,M0:168.6562,Md:4.0923344368},
  venus:  {N0:76.6799,Nd:2.46590e-5,i0:3.3946,id:2.75e-8,w0:54.8910,wd:1.38374e-5,a:0.723330,e0:0.006773,ed:-1.302e-9,M0:48.0052,Md:1.6021302244},
  mars:   {N0:49.5574,Nd:2.11081e-5,i0:1.8497,id:-1.78e-8,w0:286.5016,wd:2.92961e-5,a:1.523688,e0:0.093405,ed:2.516e-9,M0:18.6021,Md:0.5240207766},
  jupiter:{N0:100.4542,Nd:2.76854e-5,i0:1.3030,id:-1.557e-7,w0:273.8777,wd:1.64505e-5,a:5.20256,e0:0.048498,ed:4.469e-9,M0:19.8950,Md:0.0830853001},
  saturn: {N0:113.6634,Nd:2.38980e-5,i0:2.4886,id:-1.081e-7,w0:339.3939,wd:2.97661e-5,a:9.55475,e0:0.055546,ed:-9.499e-9,M0:316.9670,Md:0.0334442282},
};
const PLANET_MAG={
  mercury:(r,R,FV)=>-0.36+5*log10(r*R)+0.027*FV+2.2e-13*Math.pow(FV,6),
  venus:  (r,R,FV)=>-4.34+5*log10(r*R)+0.013*FV+4.2e-7*Math.pow(FV,3),
  mars:   (r,R,FV)=>-1.51+5*log10(r*R)+0.016*FV,
  jupiter:(r,R,FV)=>-9.25+5*log10(r*R)+0.014*FV,
  saturn: (r,R,FV)=>-9.00+5*log10(r*R)+0.044*FV, // rings near edge-on this decade
};
function planetCalc(key,d,sun){
  const el=PLANET_EL[key];
  const N=rev(el.N0+el.Nd*d), i=el.i0+el.id*d, w=rev(el.w0+el.wd*d);
  const a=el.a, e=el.e0+el.ed*d, M=rev(el.M0+el.Md*d);
  const E=kepler(M,e);
  const xv=a*(cosd(E)-e), yv=a*Math.sqrt(1-e*e)*sind(E);
  const v=atan2d(yv,xv), r=Math.hypot(xv,yv);
  const xh=r*(cosd(N)*cosd(v+w)-sind(N)*sind(v+w)*cosd(i));
  const yh=r*(sind(N)*cosd(v+w)+cosd(N)*sind(v+w)*cosd(i));
  const zh=r*sind(v+w)*sind(i);
  const xg=xh+sun.xs, yg=yh+sun.ys, zg=zh;         // geocentric ecliptic
  const eq=toRaDec(...eclToEq(xg,yg,zg,sun.ecl));
  const R=eq.r;
  const FV=acosd((r*r+R*R-sun.r*sun.r)/(2*r*R));    // phase angle
  return {ra:eq.ra,dec:eq.dec,mag:PLANET_MAG[key](r,R,FV)};
}

/* ---------- equatorial → horizontal ---------- */
function altAz(ra,dec,lst,lat){
  const HA=rev(lst-ra);
  const x=cosd(HA)*cosd(dec), y=sind(HA)*cosd(dec), z=sind(dec);
  const xh=x*sind(lat)-z*cosd(lat), zh=x*cosd(lat)+z*sind(lat);
  return {az:rev(atan2d(y,xh)+180), alt:asind(zh)};
}

/* ---------- bright-star catalogue (J2000, RA in hours) ---------- */
const STARS=[
 ['Sirius',6.7525,-16.716,-1.46,'The brightest star in the whole night sky, and one of our nearest neighbours — its light takes just 8.6 years to reach you. When it sits low it often twinkles wildly, flashing blue, white and red as our atmosphere shakes its light about.'],
 ['Canopus',6.3992,-52.696,-0.74,'The second-brightest star in the sky and a southern-hemisphere treasure. Sailors steered by it for centuries — and spacecraft still use it today to work out which way they are pointing.'],
 ['Alpha Centauri',14.6599,-60.834,-0.27,'The closest star system to our Sun, only 4.4 light-years away. What looks like a single bright point is really two suns circling each other, with a faint third — Proxima — tagging along.'],
 ['Arcturus',14.2610,19.182,-0.05,'An orange giant star, noticeably warm-coloured if you look carefully. The light landing in your eye right now left Arcturus about 37 years ago.'],
 ['Vega',18.6156,38.784,0.03,'A crisp blue-white star and one of the most studied in the sky — it was the first star ever photographed, back in 1850. In about 12,000 years it will take a turn as our pole star.'],
 ['Capella',5.2782,45.998,0.08,'Looks like one golden star, but it is actually two pairs of stars — four suns in all — packed into one point of light. Its name means "the little she-goat".'],
 ['Rigel',5.2423,-8.202,0.13,'A blue supergiant marking one corner of Orion. It shines tens of thousands of times brighter than our Sun — it only looks modest because it is roughly 860 light-years away.'],
 ['Procyon',7.6550,5.225,0.34,'The "little dog star", a close neighbour at 11 light-years. Its name means "before the dog" — from most places it rises just ahead of Sirius, the Dog Star.'],
 ['Achernar',1.6286,-57.237,0.46,'Marks the end of Eridanus, the river of stars. It spins so fast — a full turn in about two days — that it bulges into one of the most squashed stars known.'],
 ['Betelgeuse',5.9195,7.407,0.50,'A red supergiant shoulder of Orion, and visibly orange-red to the naked eye. It is nearing the end of its life and will one day explode as a supernova bright enough to see in daylight.'],
 ['Hadar',14.0637,-60.373,0.61,'One of the two "Pointer" stars. Draw a line through Hadar and Alpha Centauri and it points you straight at the Southern Cross — the classic southern way to get your bearings.'],
 ['Altair',19.8464,8.868,0.77,'A near neighbour at 17 light-years, spinning so fast it completes a rotation in under ten hours — a day on Altair is shorter than a night shift.'],
 ['Acrux',12.4433,-63.099,0.76,'The brightest star of the Southern Cross, at the foot of the constellation on the flags of Australia, New Zealand and others. Actually several blue-hot stars in one.'],
 ['Mimosa',12.7953,-59.689,1.25,'The second-brightest star of the Southern Cross, on the crossbar. A hot blue giant hundreds of light-years away.'],
 ['Aldebaran',4.5987,16.509,0.86,'The glinting orange "eye" of Taurus the bull. It sits in front of a V-shaped cluster of fainter stars, but is actually much closer to us than they are.'],
 ['Antares',16.4901,-26.432,1.06,'Its name means "rival of Mars", because it glows a similar rusty red. It is a supergiant so vast that, put where our Sun is, it would swallow Mars’ orbit.'],
 ['Spica',13.4199,-11.161,0.97,'The brightest star of Virgo — really two blue-hot stars whirling around each other every four days, so close together they are stretched out of shape.'],
 ['Pollux',7.7553,28.026,1.14,'An orange giant, one of the heavenly twins with nearby Castor. It was one of the first bright stars found to have a planet of its own.'],
 ['Fomalhaut',22.9608,-29.622,1.16,'Often called the loneliest bright star — it sits in a dull patch of sky with nothing nearby to rival it. It is ringed by a huge band of dust where planets are forming.'],
 ['Deneb',20.6905,45.280,1.25,'One of the most luminous stars you can see with the naked eye — around 2,600 light-years away, yet still bright. The light reaching you tonight left it before Rome was founded.'],
 ['Regulus',10.1395,11.967,1.36,'The "little king", marking the heart of Leo the lion. It spins so fast it is squashed like a mandarin, and would fly apart if it turned much quicker.'],
];

/* ---------- plain-language blurbs for solar-system objects ---------- */
const BODY_INFO={
  sun:{name:'Sun',kind:'Our star',blurb:'The Sun is up, which is why you can’t see much else. Never look at it directly — not even through sunglasses, and especially not through binoculars. Check back after sunset and the sky will start filling in.'},
  moon:{name:'Moon',kind:'Earth’s moon',blurb:'Our constant companion, a quarter of Earth’s width and about 380,000 km away. The line between light and dark — the terminator — is the best place to look with binoculars: the low sunlight there throws every crater into sharp relief.'},
  mercury:{name:'Mercury',kind:'Planet · closest to the Sun',blurb:'The innermost planet, and a shy one — it never strays far from the Sun, so you only ever catch it low in twilight just after sunset or before dawn. Plenty of keen skywatchers have never knowingly seen it, so spotting it is a small badge of honour.'},
  venus:{name:'Venus',kind:'Planet · second from the Sun',blurb:'The brightest thing in the sky after the Sun and Moon — so bright people regularly report it as a UFO or a landing plane. It is a rocky world wrapped in thick cloud, which is exactly why it gleams: the clouds reflect most of the sunlight that hits them.'},
  mars:{name:'Mars',kind:'Planet · the red one',blurb:'The red planet, and it genuinely looks it — a steady, rusty-orange point of light. That colour is iron oxide: Mars is, quite literally, a rusty desert. Its brightness changes a lot depending on how far away it is as both planets travel their orbits.'},
  jupiter:{name:'Jupiter',kind:'Planet · the giant',blurb:'The biggest planet — over 1,300 Earths would fit inside — and usually the brightest point of light after Venus. Through ordinary binoculars, held steady, you can often spot up to four tiny dots beside it: its largest moons, the same ones Galileo saw in 1610.'},
  saturn:{name:'Saturn',kind:'Planet · the ringed one',blurb:'To the eye Saturn is a calm, steady, slightly golden point — it rarely twinkles. The famous rings need a small telescope, but even knowing they are there changes how it feels to look at it: a world with rings, visible from your street.'},
};

/* ================================================================
   compute the whole sky for a moment + place
   ================================================================ */
function computeSky(date,lat,lng){
  const d=dayNum(date);
  const ut=((date.getTime()/86400000)%1+1)%1*24;   // UT hours
  const sun=sunCalc(d);
  const lst=rev(rev(sun.Ls+180)+ut*15+lng);        // local sidereal, degrees
  const objs=[];

  const sunAA=altAz(sun.ra,sun.dec,lst,lat);
  objs.push({id:'sun',name:'Sun',type:'sun',mag:-26.7,...sunAA});

  const m=moonCalc(d,sun);
  const mAA=altAz(m.ra,m.dec,lst,lat);
  mAA.alt-=asind(1/m.r)*cosd(mAA.alt);             // topocentric parallax
  objs.push({id:'moon',name:'Moon',type:'moon',mag:m.mag,frac:m.frac,age:m.age,...mAA});

  for(const key of Object.keys(PLANET_EL)){
    const p=planetCalc(key,d,sun);
    objs.push({id:key,name:BODY_INFO[key].name,type:'planet',mag:p.mag,...altAz(p.ra,p.dec,lst,lat)});
  }
  for(const s of STARS){
    objs.push({id:'star:'+s[0],name:s[0],type:'star',mag:s[3],blurb:s[4],...altAz(s[1]*15,s[2],lst,lat)});
  }
  return {objs,sunAlt:sunAA.alt};
}

/* ---------- plain-language helpers ---------- */
const COMPASS=['north','north-east','east','south-east','south','south-west','west','north-west'];
const COMPASS_AB=['N','NE','E','SE','S','SW','W','NW'];
function compassWord(az){return COMPASS[Math.round(az/45)%8];}
function compassAb(az){return COMPASS_AB[Math.round(az/45)%8];}
function altWords(alt){
  if(alt<6)  return 'sitting right on the horizon';
  if(alt<18) return 'low in the sky';
  if(alt<40) return 'about a third of the way up';
  if(alt<60) return 'about halfway up the sky';
  if(alt<78) return 'high in the sky';
  return 'almost straight overhead';
}
function whereSentence(o){
  if(o.alt>=78) return 'Look almost straight up.';
  return 'Look to the '+compassWord(o.az)+' — '+altWords(o.alt)+'.';
}
function phaseName(age){
  if(age<22.5||age>=337.5) return 'New Moon';
  if(age<67.5)  return 'Waxing crescent';
  if(age<112.5) return 'First quarter';
  if(age<157.5) return 'Waxing gibbous';
  if(age<202.5) return 'Full Moon';
  if(age<247.5) return 'Waning gibbous';
  if(age<292.5) return 'Last quarter';
  return 'Waning crescent';
}
function darkness(sunAlt){
  if(sunAlt>0)   return {code:'day',  msg:'The Sun is up, so the sky is too bright for stargazing. The Moon and Venus can sometimes be picked out in daylight if you know where to look.'};
  if(sunAlt>-6)  return {code:'civil',msg:'The sky isn’t dark yet — the Sun has just set. The Moon and the brightest planets will pop out first; check back in half an hour or so.'};
  if(sunAlt>-12) return {code:'naut', msg:'Twilight — the sky is darkening. Bright planets and the strongest stars are already showing.'};
  return {code:'dark', msg:'The sky is properly dark. Good looking-up conditions — here’s what’s out there.'};
}

/* ================================================================
   state + storage
   ================================================================ */
const $=id=>document.getElementById(id);
function load(k,f){try{const v=localStorage.getItem(k);return v===null?f:JSON.parse(v);}catch(e){return f;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let state={
  loc:load('sky.loc',{lat:-42.882,lng:147.327,name:'Hobart',isDefault:true}),
  offset:0,                                  // minutes from now
  mode:load('sky.mode','dome'),
  nv:load('sky.nv',false),
};
let sky=null, hitZones=[];

function effDate(){return new Date(Date.now()+state.offset*60000);}

/* ---------- palette (read live so night-vision recolours canvas) ---------- */
function pal(){
  const s=getComputedStyle(document.body);
  const g=n=>s.getPropertyValue(n).trim();
  return {bg:g('--bg'),panel:g('--panel2'),line:g('--line'),ink:g('--ink'),
          dim:g('--dim'),faint:g('--faint'),accent:g('--accent'),star:g('--star')};
}

/* ================================================================
   rendering
   ================================================================ */
function renderAll(){
  const {lat,lng}=state.loc;
  sky=computeSky(effDate(),lat,lng);
  renderStatus();
  renderChart();
  renderList();
}

function renderStatus(){
  const dk=darkness(sky.sunAlt);
  const when=state.offset===0?'Right now':'At '+fmtTime(effDate());
  $('status').innerHTML='<span class="big">'+when+' — </span>'+dk.msg;
  const l=state.loc;
  $('locline').innerHTML='From <a id="locLink">'+esc(l.name||(l.lat.toFixed(2)+'°, '+l.lng.toFixed(2)+'°'))+'</a>'+
    (l.isDefault?' — <a id="locLink2">set your real location</a>':'');
  const open=()=>$('locOv').classList.add('show');
  $('locLink').onclick=open;
  const l2=$('locLink2'); if(l2)l2.onclick=open;
}

function fmtTime(d){
  return d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* visible list, brightest first */
function visibleObjs(){
  return sky.objs.filter(o=>o.alt>0.25).sort((a,b)=>a.mag-b.mag);
}

function renderList(){
  const vis=visibleObjs().filter(o=>o.type!=='sun');
  const dk=darkness(sky.sunAlt);
  $('listSub').textContent='Brightest first · tap anything for the story';
  const box=$('list'); box.innerHTML='';
  if(!vis.length){
    box.innerHTML='<div class="card empty">Nothing bright is above the horizon right now — which is unusual. Try scrubbing the time slider forward a few hours.</div>';
    return;
  }
  for(const o of vis){
    const daylight=(dk.code==='day'||dk.code==='civil') && o.mag>-3 && o.type!=='moon';
    const b=document.createElement('button');
    b.className='obj'+(daylight?' hidden-day':'');
    const sub=daylight?'Up now, but hidden by daylight — '+compassWord(o.az):whereSentence(o).replace(/^Look /,'').replace(/\.$/,'');
    const extra=o.type==='moon'?' · '+phaseName(o.age)+', '+Math.round(o.frac*100)+'% lit':'';
    b.innerHTML='<span class="dot"><canvas width="34" height="34"></canvas></span>'+
      '<span class="txt"><span class="nm">'+esc(o.name)+'</span>'+
      '<span class="dir" style="display:block">'+esc(cap(sub)+extra)+'</span></span>'+
      '<span class="nums">'+compassAb(o.az)+' '+Math.round(o.az)+'°<br>'+Math.round(o.alt)+'° up</span>';
    b.onclick=()=>showCard(o);
    box.appendChild(b);
    drawListDot(b.querySelector('canvas'),o);
  }
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function drawListDot(cv,o){
  const ctx=cv.getContext('2d'),P=pal(),c=17;
  ctx.clearRect(0,0,34,34);
  if(o.type==='moon'){drawMoonGlyph(ctx,c,c,11,o.frac,o.age<180,state.loc.lat<0);return;}
  const r=Math.max(3,Math.min(10,8-o.mag*1.6));
  const col=o.type==='star'?P.star:P.accent;
  const g=ctx.createRadialGradient(c,c,0,c,c,r*1.9);
  g.addColorStop(0,col);g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(c,c,r*1.9,0,7);ctx.fill();
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(c,c,r,0,7);ctx.fill();
}

/* moon phase glyph: lit fraction, waxing flag, southern-hemisphere flip */
function drawMoonGlyph(ctx,x,y,R,frac,waxing,south){
  const P=pal();
  let litRight=waxing?true:false;      // northern-hemisphere convention
  if(south)litRight=!litRight;         // flipped when you live upside-down
  ctx.save();
  ctx.beginPath();ctx.arc(x,y,R,0,7);ctx.fillStyle=P.faint;ctx.fill();
  ctx.beginPath();
  const dir=litRight?1:-1;
  ctx.arc(x,y,R,-Math.PI/2*dir,Math.PI/2*dir,false);
  const w=Math.abs(frac-0.5)*2*R;
  ctx.ellipse(x,y,w,R,0,Math.PI/2*dir,-Math.PI/2*dir,frac<0.5);
  ctx.fillStyle=P.accent;ctx.fill();
  ctx.restore();
}

/* ---------- chart ---------- */
function renderChart(){
  if(!sky)return;
  const cv=$('chart'), dpr=window.devicePixelRatio||1;
  const w=cv.clientWidth||cv.parentElement.clientWidth-32;
  const h=state.mode==='dome'?Math.min(w,420):230;
  cv.style.height=h+'px';
  cv.width=w*dpr; cv.height=h*dpr;
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  hitZones=[];
  if(state.mode==='dome')drawDome(ctx,w,h); else drawStrip(ctx,w,h);
}

function drawDome(ctx,w,h){
  const P=pal(), cx=w/2, cy=h/2, R=Math.min(w,h)/2-26;
  ctx.clearRect(0,0,w,h);
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  g.addColorStop(0,P.panel);g.addColorStop(1,P.bg);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.fill();
  ctx.strokeStyle=P.line;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.stroke();
  ctx.setLineDash([3,5]);ctx.lineWidth=1;
  for(const a of[30,60]){ctx.beginPath();ctx.arc(cx,cy,R*(90-a)/90,0,7);ctx.stroke();}
  ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(cx-R,cy);ctx.lineTo(cx+R,cy);ctx.moveTo(cx,cy-R);ctx.lineTo(cx,cy+R);
  ctx.strokeStyle=P.line;ctx.globalAlpha=.5;ctx.stroke();ctx.globalAlpha=1;
  ctx.fillStyle=P.dim;ctx.font='600 13px -apple-system,system-ui,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('N',cx,cy-R-13);ctx.fillText('S',cx,cy+R+13);
  ctx.fillText('E',cx+R+13,cy);ctx.fillText('W',cx-R-13,cy);
  ctx.fillStyle=P.faint;ctx.font='10px -apple-system,system-ui,sans-serif';
  ctx.fillText('horizon = edge · straight up = centre',cx,h-8);

  // objects: azimuth = angle (N up, E right), altitude = distance from centre
  const pos=o=>{
    const d=R*(90-o.alt)/90;
    return {x:cx+d*sind(o.az), y:cy-d*cosd(o.az)};
  };
  for(const o of sky.objs.filter(o=>o.alt>0).sort((a,b)=>b.mag-a.mag)){
    const {x,y}=pos(o);
    drawObj(ctx,x,y,o,P);
  }
}

function drawStrip(ctx,w,h){
  const P=pal(), padL=8,padR=8, y0=h-30, yTop=16;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle=P.panel;ctx.fillRect(0,0,w,h);
  const X=az=>padL+(az/360)*(w-padL-padR);
  const Y=alt=>y0-(alt/90)*(y0-yTop);
  ctx.setLineDash([3,5]);ctx.strokeStyle=P.line;ctx.lineWidth=1;
  ctx.font='9px -apple-system,system-ui,sans-serif';ctx.textAlign='left';ctx.textBaseline='bottom';
  for(const a of[30,60]){
    ctx.beginPath();ctx.moveTo(padL,Y(a));ctx.lineTo(w-padR,Y(a));ctx.stroke();
    ctx.fillStyle=P.faint;ctx.fillText(a+'° up',padL+2,Y(a)-2);
  }
  ctx.setLineDash([]);
  ctx.strokeStyle=P.dim;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(padL,y0);ctx.lineTo(w-padR,y0);ctx.stroke();
  ctx.fillStyle=P.dim;ctx.font='600 11px -apple-system,system-ui,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='top';
  const marks=['N','NE','E','SE','S','SW','W','NW','N'];
  for(let i=0;i<9;i++){ctx.fillText(marks[i],X(i*45),y0+6);}
  for(const o of sky.objs.filter(o=>o.alt>0).sort((a,b)=>b.mag-a.mag)){
    drawObj(ctx,X(o.az),Y(o.alt),o,P);
  }
}

function drawObj(ctx,x,y,o,P){
  if(o.type==='sun'){
    const g=ctx.createRadialGradient(x,y,0,x,y,20);
    g.addColorStop(0,P.accent);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,20,0,7);ctx.fill();
    ctx.fillStyle=P.accent;ctx.beginPath();ctx.arc(x,y,7,0,7);ctx.fill();
    label(ctx,x,y,'Sun',P,10);
  }else if(o.type==='moon'){
    drawMoonGlyph(ctx,x,y,8,o.frac,o.age<180,state.loc.lat<0);
    label(ctx,x,y,'Moon',P,11);
  }else{
    const r=Math.max(2,Math.min(7,5.5-o.mag*1.1));
    const col=o.type==='star'?P.star:P.accent;
    const g=ctx.createRadialGradient(x,y,0,x,y,r*2.2);
    g.addColorStop(0,col);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*2.2,0,7);ctx.fill();
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();
    if(o.type==='planet'||o.mag<0.9)label(ctx,x,y,o.name,P,r+3);
  }
  hitZones.push({x,y,o});
}
function label(ctx,x,y,txt,P,off){
  ctx.fillStyle=P.dim;ctx.font='10.5px -apple-system,system-ui,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(txt,x,y+off+2);
}

/* chart tap → nearest object */
$('chart').addEventListener('click',ev=>{
  const r=$('chart').getBoundingClientRect();
  const x=ev.clientX-r.left, y=ev.clientY-r.top;
  let best=null,bd=26;
  for(const z of hitZones){
    const d=Math.hypot(z.x-x,z.y-y);
    if(d<bd){bd=d;best=z.o;}
  }
  if(best)showCard(best);
});

/* ---------- blurb card ---------- */
function showCard(o){
  let info;
  if(o.type==='star')info={name:o.name,kind:'Bright star',blurb:o.blurb};
  else info=BODY_INFO[o.id];
  let extra='';
  if(o.type==='moon'){
    extra='<p class="blurb" style="color:var(--dim)">'+phaseName(o.age)+' — '+Math.round(o.frac*100)+'% lit tonight.</p>';
  }
  const below=o.alt<=0.25;
  const where=below?'Below the horizon right now — not visible.':whereSentence(o);
  $('cardSheet').innerHTML=
    '<h3>'+esc(info.name)+'</h3><div class="kind">'+esc(info.kind)+'</div>'+
    '<p class="where">'+esc(where)+'</p>'+extra+
    '<p class="blurb">'+esc(info.blurb)+'</p>'+
    '<div class="statline">'+
      '<div>Direction<b>'+compassAb(o.az)+' · '+Math.round(o.az)+'°</b></div>'+
      '<div>Height<b>'+Math.round(o.alt)+'° above horizon</b></div>'+
      (o.type!=='sun'?'<div>Brightness<b>mag '+o.mag.toFixed(1)+'</b></div>':'')+
    '</div>'+
    '<button class="close" onclick="document.getElementById(\'cardOv\').classList.remove(\'show\')">Close</button>';
  $('cardOv').classList.add('show');
}
$('cardOv').addEventListener('click',e=>{if(e.target.id==='cardOv')$('cardOv').classList.remove('show');});
$('locOv').addEventListener('click',e=>{if(e.target.id==='locOv')$('locOv').classList.remove('show');});

/* ================================================================
   controls
   ================================================================ */
function setMode(m){
  state.mode=m;save('sky.mode',m);
  $('modeDome').classList.toggle('on',m==='dome');
  $('modeStrip').classList.toggle('on',m==='strip');
  renderChart();
}
$('modeDome').onclick=()=>setMode('dome');
$('modeStrip').onclick=()=>setMode('strip');

$('timeSlider').addEventListener('input',e=>{
  state.offset=+e.target.value;
  $('timeLabel').textContent=state.offset===0?'now':
    (state.offset>0?'+':'−')+Math.abs(state.offset/60).toFixed(1).replace('.0','')+'h · '+fmtTime(effDate());
  renderAll();
});
$('nowBtn').onclick=()=>{
  state.offset=0;$('timeSlider').value=0;$('timeLabel').textContent='now';renderAll();
};

$('nvBtn').onclick=()=>{
  state.nv=!state.nv;save('sky.nv',state.nv);
  document.body.classList.toggle('nv',state.nv);
  $('nvBtn').classList.toggle('on',state.nv);
  renderAll();
};

/* ---------- location ---------- */
function setLoc(lat,lng,name){
  state.loc={lat,lng,name};
  save('sky.loc',state.loc);
  $('locOv').classList.remove('show');
  renderAll();
}
$('geoBtn').onclick=()=>{
  if(!navigator.geolocation){alert('Location isn’t available on this device — pick a place below instead.');return;}
  $('geoBtn').textContent='Finding you…';
  navigator.geolocation.getCurrentPosition(
    p=>{ $('geoBtn').textContent='◉  Use my location';
         setLoc(+p.coords.latitude.toFixed(3),+p.coords.longitude.toFixed(3),'Your location'); },
    ()=>{ $('geoBtn').textContent='◉  Use my location';
          alert('Couldn’t get your location — no problem, pick a place or type rough coordinates below.'); },
    {timeout:9000,maximumAge:600000});
};
document.querySelectorAll('[data-loc]').forEach(b=>{
  b.onclick=()=>{const[la,ln,nm]=b.dataset.loc.split(',');setLoc(+la,+ln,nm);};
});
$('mSave').onclick=()=>{
  const la=parseFloat($('mLat').value),ln=parseFloat($('mLng').value);
  if(isNaN(la)||isNaN(ln)||Math.abs(la)>90||Math.abs(ln)>180){alert('Those coordinates don’t look right — latitude ±90, longitude ±180.');return;}
  setLoc(la,ln,$('mNm').value.trim()||la.toFixed(1)+'°, '+ln.toFixed(1)+'°');
};
$('locClose').onclick=()=>$('locOv').classList.remove('show');

/* ================================================================
   boot
   ================================================================ */
if(state.nv){document.body.classList.add('nv');$('nvBtn').classList.add('on');}
renderAll();
setMode(state.mode);

/* keep it live — redraw each minute when showing "now" */
setInterval(()=>{if(state.offset===0)renderAll();},60000);
window.addEventListener('resize',renderChart);

/* first visit with the default location → offer the location sheet */
if(state.loc.isDefault && !load('sky.locAsked',false)){
  save('sky.locAsked',true);
  setTimeout(()=>$('locOv').classList.add('show'),700);
}

/* service worker */
if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
